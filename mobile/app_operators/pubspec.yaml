name: app_operators
description: WEB.INCLUSIVE — App Operatori ADI
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.3.0
  flutter: ^3.19.0

dependencies:
  flutter:
    sdk: flutter

  # Routing
  go_router: ^13.2.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Network
  dio: ^5.4.3

  # DB locale (offline-first)
  drift: ^2.19.1
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.23

  # Sicurezza
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  local_auth: ^2.2.0

  # GPS & permessi
  geolocator: ^12.0.0
  permission_handler: ^11.3.1

  # Push notifications
  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.3
  flutter_local_notifications: ^17.1.2

  # Background sync
  workmanager: ^0.5.2
  connectivity_plus: ^6.0.3

  # UI
  table_calendar: ^3.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  lottie: ^3.1.2
  fl_chart: ^0.68.0

  # Serializzazione
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Utils
  intl: ^0.19.0
  logger: ^2.4.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.10
  drift_dev: ^2.19.1
  freezed: ^2.5.3
  json_serializable: ^6.8.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
