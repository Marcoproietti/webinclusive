# ─────────────────────────────────────────────────────────
# WEB.INCLUSIVE — Redis Production Config
# ─────────────────────────────────────────────────────────

# Network
bind 0.0.0.0
port 6379
protected-mode yes

# Autenticazione (password da env)
# requirepass viene passato tramite --requirepass nel command docker-compose

# Persistenza — append-only file (migliore durabilità)
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Limite memoria (adattare alla RAM disponibile)
maxmemory 512mb
maxmemory-policy allkeys-lru

# Log
loglevel notice
logfile ""

# Performance
tcp-keepalive 300
timeout 0
tcp-backlog 511

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Disable dangerous commands in production
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command CONFIG ""
