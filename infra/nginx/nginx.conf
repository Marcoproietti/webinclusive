# ─────────────────────────────────────────────────────────
# WEB.INCLUSIVE — NGINX Production Config
# TLS 1.3, HTTP/2, rate limiting, WebSocket proxy, security headers
# ─────────────────────────────────────────────────────────

worker_processes  auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 4096;
  multi_accept       on;
  use                epoll;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging JSON strutturato ────────────────────────────
  log_format json_access escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"x_forwarded_for":"$http_x_forwarded_for",'
      '"method":"$request_method",'
      '"uri":"$uri",'
      '"query":"$query_string",'
      '"status":$status,'
      '"bytes_sent":$bytes_sent,'
      '"request_time":$request_time,'
      '"upstream_time":"$upstream_response_time",'
      '"user_agent":"$http_user_agent",'
      '"request_id":"$http_x_request_id"'
    '}';

  access_log /var/log/nginx/access.log json_access;
  error_log  /var/log/nginx/error.log  warn;

  # ── Performance ─────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  keepalive_requests 1000;
  server_tokens      off;

  # Compressione
  gzip              on;
  gzip_vary         on;
  gzip_min_length   1024;
  gzip_comp_level   6;
  gzip_types        text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;

  # ── Rate limiting zones ─────────────────────────────────
  limit_req_zone  $binary_remote_addr zone=api_zone:20m    rate=60r/m;
  limit_req_zone  $binary_remote_addr zone=auth_zone:10m   rate=10r/m;
  limit_req_zone  $binary_remote_addr zone=mobile_zone:20m rate=200r/m;
  limit_req_zone  $binary_remote_addr zone=wb_zone:5m      rate=5r/m;
  limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

  # ── Proxy params comuni ─────────────────────────────────
  proxy_http_version      1.1;
  proxy_set_header Host            $host;
  proxy_set_header X-Real-IP       $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Request-Id    $request_id;
  proxy_read_timeout      30s;
  proxy_connect_timeout   10s;
  proxy_send_timeout      30s;
  proxy_buffer_size       128k;
  proxy_buffers           4 256k;
  proxy_busy_buffers_size 256k;

  # ── Upstream: API Gateway ───────────────────────────────
  upstream gateway {
    server    gateway:3000;
    keepalive 32;
  }

  # ── Redirect HTTP → HTTPS ───────────────────────────────
  server {
    listen      80 default_server;
    server_name _;
    return      301 https://$host$request_uri;
  }

  # ── Server principale HTTPS ─────────────────────────────
  server {
    listen              443 ssl;
    http2               on;
    server_name         app.webinclusive.it;

    # ── TLS ────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security Headers ────────────────────────────────────
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY"            always;
    add_header X-Content-Type-Options     "nosniff"         always;
    add_header X-XSS-Protection           "1; mode=block"   always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "geolocation=(self), camera=(), microphone=()" always;
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss://app.webinclusive.it; font-src 'self'; frame-ancestors 'none';"
      always;

    # ── Rate limit globale ──────────────────────────────────
    limit_conn conn_zone 100;

    # ── Auth endpoints (rate limit stretto) ─────────────────
    location ~* ^/api/v1/auth/(login|refresh) {
      limit_req  zone=auth_zone burst=5 nodelay;
      limit_conn conn_zone 10;
      proxy_pass http://gateway;
    }

    # ── Whistleblowing (rate limit molto stretto) ────────────
    location /api/v1/wb/reports {
      limit_req  zone=wb_zone burst=3 nodelay;
      proxy_pass http://gateway;
    }

    # ── WebSocket Centrale Operativa ─────────────────────────
    location /ws/ {
      proxy_pass         http://gateway;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;

      # Rate limit WS
      limit_conn conn_zone 50;
    }

    # ── API generali ─────────────────────────────────────────
    location /api/ {
      limit_req  zone=api_zone burst=20 nodelay;
      limit_conn conn_zone 200;

      proxy_pass           http://gateway;
      client_max_body_size 10m;
    }

    # ── React SPA ────────────────────────────────────────────
    location / {
      root      /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;

      # Cache asset statici
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
      }

      # No cache per index.html
      location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        expires    0;
      }
    }

    # ── Blocca accesso a file sensibili ──────────────────────
    location ~* \.(env|git|htaccess|htpasswd)$ {
      deny all;
      return 404;
    }
  }

  # ── Server Grafana (monitoring interno) ─────────────────
  server {
    listen      443 ssl;
    http2       on;
    server_name monitoring.webinclusive.it;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.3;

    # Accesso solo da IP aziendali
    allow 10.0.0.0/8;
    allow 192.168.0.0/16;
    deny  all;

    location / {
      proxy_pass http://grafana:3000;
    }
  }
}
